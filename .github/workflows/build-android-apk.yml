name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK via EAS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build APK with EAS
        working-directory: artifacts/mobile
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_DOMAIN: b3c6dadb-c834-4261-8f7a-c211f162114f-00-khhgwmk6ldxz.replit.app
          EXPO_PUBLIC_REPL_ID: b3c6dadb-c834-4261-8f7a-c211f162114f
