name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with embedded JS
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_DOMAIN: b3c6dadb-c834-4261-8f7a-c211f162114f-00-khhgwmk6ldxz.replit.app
      EXPO_PUBLIC_REPL_ID: b3c6dadb-c834-4261-8f7a-c211f162114f

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Android project (expo prebuild)
        working-directory: artifacts/mobile
        run: |
          pnpm exec expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_GIT_STATUS: 1

      - name: Bundle JavaScript (expo export:embed)
        working-directory: artifacts/mobile
        run: |
          mkdir -p android/app/src/main/assets
          pnpm exec expo export:embed \
            --platform android \
            --dev false \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/
          echo "Bundle size: $(wc -c < android/app/src/main/assets/index.android.bundle) bytes"

      - name: Make gradlew executable
        working-directory: artifacts/mobile/android
        run: chmod +x gradlew

      - name: Build release APK (skip re-bundling, use pre-built JS)
        working-directory: artifacts/mobile/android
        run: |
          ./gradlew assembleRelease \
            -x bundleReleaseJsAndAssets \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false \
            --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: docscan-release-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
