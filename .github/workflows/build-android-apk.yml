name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_DOMAIN: b3c6dadb-c834-4261-8f7a-c211f162114f-00-khhgwmk6ldxz.replit.app
      EXPO_PUBLIC_REPL_ID: b3c6dadb-c834-4261-8f7a-c211f162114f

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Android project (expo prebuild)
        working-directory: artifacts/mobile
        run: |
          pnpm exec expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_GIT_STATUS: 1

      - name: Remove broken entryFile from build.gradle
        working-directory: artifacts/mobile/android
        run: |
          # Gradle resolves entryFile via pnpm virtual store absolute path,
          # which Metro cannot resolve. Removing this line lets expo export:embed
          # auto-detect the correct entry (expo-router/entry) the same way it
          # works when called directly without --entry-file.
          sed -i '/entryFile = file/d' app/build.gradle
          echo "Patched build.gradle - entryFile line removed"
          grep -n "entryFile" app/build.gradle || echo "Confirmed: no entryFile line remains"

      - name: Make gradlew executable
        working-directory: artifacts/mobile/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: artifacts/mobile/android
        run: |
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false \
            --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: docscan-release-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
